<!DOCTYPE html>
<html>

<head>

<title>AI Mock Interview</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial;
}

body{
    background:#f4f7fc;
}

.header{
    background:#2563eb;
    color:white;
    padding:20px;
    text-align:center;
}

.chat-container{
    width:80%;
    max-width:900px;
    margin:30px auto;
    background:white;
    border-radius:15px;
    box-shadow:0 5px 20px rgba(0,0,0,.1);
    overflow:hidden;
}

.chat-box{
    height:500px;
    overflow-y:auto;
    padding:20px;
}

.ai{
    background:#e0ecff;
    padding:15px;
    border-radius:10px;
    margin:10px 0;
    width:80%;
}

.user{
    background:#dcfce7;
    padding:15px;
    border-radius:10px;
    margin:10px 0;
    width:80%;
    margin-left:auto;
}

.input-box{
    display:flex;
    padding:20px;
    border-top:1px solid #ddd;
}

input{
    flex:1;
    padding:15px;
    border:1px solid #ddd;
    border-radius:10px;
    font-size:16px;
}

button{
    background:#2563eb;
    color:white;
    border:none;
    padding:15px 30px;
    margin-left:10px;
    border-radius:10px;
    cursor:pointer;
}

</style>

</head>

<body>

<div class="header">

    <h1>
        AI Mock Interview -
        {{role}}
    </h1>

</div>

<div class="chat-container">

    <div
        class="chat-box"
        id="chat">

        <div class="ai">
            Hello! I am your AI interviewer.
        </div>

        <div class="ai">
            {{questions[0]}}
        </div>

    </div>

    <div class="input-box">

        <input
            type="text"
            id="answer"
            placeholder="Type your answer...">

        <button onclick="sendAnswer()">
            Send
        </button>

    </div>

</div>

<script>

let questions = [
{% for q in questions %}
"{{q}}",
{% endfor %}
];

let current = 1;

function sendAnswer(){

    let input =
        document.getElementById(
            "answer"
        );

    let value =
        input.value;

    if(value=="")
        return;

    let chat =
        document.getElementById(
            "chat"
        );

    chat.innerHTML +=
        '<div class="user">'
        + value +
        '</div>';

    if(current <
        questions.length){

        setTimeout(function(){

            chat.innerHTML +=
                '<div class="ai">'
                + questions[current]
                + '</div>';

            chat.scrollTop =
                chat.scrollHeight;

            current++;

        },1000);
    }
    else{

        setTimeout(function(){

            chat.innerHTML +=
                '<div class="ai"><b>Interview Completed!</b><br><br>Overall Performance: Good communication skills and technical understanding.</div>';

            chat.scrollTop =
                chat.scrollHeight;

        },1000);
    }

    input.value="";
}

</script>

</body>
</html>
