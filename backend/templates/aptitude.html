<!DOCTYPE html>
<html>
<head>
    <title>Aptitude Test</title>

    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Segoe UI',sans-serif;
        }

        body{
            background:#eef2f7;
        }

        /* HEADER */

        .header{
            background:#2563eb;
            color:white;
            padding:20px 40px;
            display:flex;
            justify-content:space-between;
            align-items:center;
            box-shadow:0 2px 10px rgba(0,0,0,.1);
        }

        .header h1{
            font-size:32px;
        }

        #timer{
            font-size:28px;
            font-weight:bold;
        }

        /* CONTAINER */

        .container{
            width:90%;
            max-width:1200px;
            margin:30px auto;
        }

        /* PROGRESS */

        .progress-card{
            background:white;
            padding:25px;
            border-radius:15px;
            box-shadow:0 2px 10px rgba(0,0,0,.1);
            margin-bottom:30px;
        }

        .progress{
            width:100%;
            height:20px;
            background:#ddd;
            border-radius:20px;
            overflow:hidden;
            margin:20px 0;
        }

        .progress-bar{
            width:0%;
            height:100%;
            background:#2563eb;
            transition:.3s;
        }

        /* QUESTION */

        .question-card{
            background:white;
            padding:35px;
            border-radius:20px;
            box-shadow:0 5px 20px rgba(0,0,0,.08);
        }

        .question-number{
            color:#2563eb;
            font-size:18px;
            font-weight:bold;
        }

        .question{
            font-size:24px;
            margin:20px 0;
            line-height:1.5;
        }

        /* OPTIONS */

        .option{
            border:2px solid #ddd;
            padding:18px;
            border-radius:12px;
            margin:15px 0;
            cursor:pointer;
            transition:.2s;
        }

        .option:hover{
            background:#f3f7ff;
            border-color:#2563eb;
        }

        .option input{
            margin-right:10px;
        }

        /* BUTTONS */

        .buttons{
            display:flex;
            justify-content:space-between;
            margin-top:30px;
        }

        button{
            border:none;
            padding:15px 30px;
            border-radius:10px;
            cursor:pointer;
            font-size:16px;
            color:white;
        }

        .prev{
            background:#64748b;
        }

        .next{
            background:#2563eb;
        }

        .submit{
            background:#16a34a;
        }

    </style>
</head>

<body>

<div class="header">

    <h1>Aptitude Test</h1>

    <div id="timer">
        30:00
    </div>

</div>


<div class="container">

    <!-- PROGRESS -->
    <div class="progress-card">

        <h2>Test Progress</h2>

        <div class="progress">
            <div class="progress-bar"
                 id="progressBar">
            </div>
        </div>

        <h3>
            Question
            <span id="current">
                1
            </span>
            /
            {{questions|length}}
        </h3>

    </div>


    <!-- TEST FORM -->
    <form method="POST"
          id="testForm">

        {% for q in questions %}

        <div class="question-card questionBox"

            {% if loop.index != 1 %}
                style="display:none"
            {% endif %}>

            <div class="question-number">
                Question {{loop.index}}
            </div>

            <div class="question">
                {{q.question}}
            </div>

            {% for option in q.options %}

            <label class="option">

                <input
                    type="radio"
                    name="q{{loop.index}}"
                    value="{{option}}">

                {{option}}

            </label>

            {% endfor %}

        </div>

        {% endfor %}


        <div class="buttons">

            <button
                type="button"
                class="prev"
                onclick="previousQuestion()">

                Previous

            </button>

            <button
                type="button"
                class="next"
                onclick="nextQuestion()">

                Next

            </button>

            <button
                type="submit"
                class="submit">

                Submit Test

            </button>

        </div>

    </form>

</div>


<script>

let currentQuestion = 0;

let questions =
    document.querySelectorAll(
        ".questionBox"
    );

function updateProgress(){

    document.getElementById(
        "current"
    ).innerHTML =
        currentQuestion + 1;

    let percentage =
        ((currentQuestion+1)
        /
        questions.length)
        *100;

    document.getElementById(
        "progressBar"
    ).style.width =
        percentage + "%";
}

function showQuestion(index){

    questions.forEach(
        q => q.style.display="none"
    );

    questions[index]
        .style.display="block";

    updateProgress();
}

function nextQuestion(){

    if(
        currentQuestion <
        questions.length-1
    ){

        currentQuestion++;

        showQuestion(
            currentQuestion
        );
    }
}

function previousQuestion(){

    if(
        currentQuestion>0
    ){

        currentQuestion--;

        showQuestion(
            currentQuestion
        );
    }
}

showQuestion(0);


/* TIMER */

let time = 1800;

let timer =
setInterval(function(){

    let m =
        Math.floor(time/60);

    let s =
        time%60;

    document.getElementById(
        "timer"
    ).innerHTML =
        m + ":" +
        (s<10?"0":"")+s;

    time--;

    if(time<0){

        clearInterval(timer);

        alert(
            "Time Over!"
        );

        document
            .getElementById(
                "testForm"
            )
            .submit();
    }

},1000);

</script>

</body>
</html>
