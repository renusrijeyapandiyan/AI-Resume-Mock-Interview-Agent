<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>
        AI Mock Interview Login
    </title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
          rel="stylesheet">

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Poppins',sans-serif;
        }

        body{
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:linear-gradient(
                135deg,
                #4f46e5,
                #7c3aed,
                #9333ea
            );
        }

        .container{
            width:900px;
            height:550px;
            background:white;
            border-radius:25px;
            overflow:hidden;
            display:flex;
            box-shadow:0 20px 50px rgba(0,0,0,.2);
        }

        /* LEFT SIDE */

        .left{
            flex:1;
            background:linear-gradient(
                135deg,
                #4f46e5,
                #9333ea
            );
            color:white;
            padding:60px 40px;
            display:flex;
            flex-direction:column;
            justify-content:center;
            align-items:center;
            text-align:center;
        }

        .logo{
            font-size:70px;
            margin-bottom:20px;
        }

        .left h1{
            font-size:36px;
            margin-bottom:20px;
        }

        .left p{
            font-size:16px;
            line-height:1.8;
            opacity:.9;
        }

        /* RIGHT SIDE */

        .right{
            flex:1;
            padding:60px;
            display:flex;
            flex-direction:column;
            justify-content:center;
        }

        .right h2{
            color:#111827;
            margin-bottom:10px;
        }

        .subtitle{
            color:#6b7280;
            margin-bottom:30px;
        }

        .input-box{
            margin-bottom:20px;
        }

        .input-box label{
            display:block;
            margin-bottom:8px;
            font-weight:500;
            color:#374151;
        }

        .input-box input{
            width:100%;
            padding:15px;
            border:1px solid #d1d5db;
            border-radius:12px;
            outline:none;
            font-size:15px;
        }

        .input-box input:focus{
            border:2px solid #4f46e5;
        }

        .options{
            display:flex;
            justify-content:space-between;
            margin-bottom:25px;
            font-size:14px;
        }

        .options a{
            text-decoration:none;
            color:#4f46e5;
        }

        .login-btn{
            width:100%;
            padding:15px;
            border:none;
            border-radius:12px;
            background:linear-gradient(
                135deg,
                #4f46e5,
                #9333ea
            );
            color:white;
            font-size:16px;
            font-weight:600;
            cursor:pointer;
            transition:.3s;
        }

        .login-btn:hover{
            transform:translateY(-2px);
        }

        .register{
            margin-top:25px;
            text-align:center;
        }

        .register a{
            color:#4f46e5;
            text-decoration:none;
            font-weight:600;
        }

        @media(max-width:900px){

            .container{
                width:95%;
                height:auto;
                flex-direction:column;
            }

            .left{
                padding:40px;
            }

            .right{
                padding:40px;
            }
        }

    </style>

</head>

<body>

<div class="container">

    <!-- LEFT SIDE -->

    <div class="left">

        <div class="logo">
            🤖
        </div>

        <h1>
            AI Mock Interview Agent
        </h1>

        <p>
            Practice aptitude, technical,
            coding and HR interviews
            using Artificial Intelligence,
            NLP and Machine Learning.
        </p>

    </div>

    <!-- RIGHT SIDE -->

    <div class="right">

        <h2>
            Welcome Back
        </h2>

        <p class="subtitle">
            Login to continue your interview preparation
        </p>

        <form method="POST">

            <div class="input-box">

                <label>
                    Email Address
                </label>

                <input
                    type="email"
                    name="email"
                    placeholder="Enter your email"
                    required>

            </div>

            <div class="input-box">

                <label>
                    Password
                </label>

                <input
                    type="password"
                    name="password"
                    placeholder="Enter your password"
                    required>

            </div>

            <div class="options">

                <label>
                    <input type="checkbox">
                    Remember Me
                </label>

                <a href="#">
                    Forgot Password?
                </a>

            </div>

            <button
                class="login-btn"
                type="submit">

                Login

            </button>

        </form>

        <div class="register">

            Don't have an account?

            <a href="/register">
                Register Here
            </a>

        </div>

    </div>

</div>

</body>
</html>
