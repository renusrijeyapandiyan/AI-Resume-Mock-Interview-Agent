<!DOCTYPE html>
<html>
<head>

    <title>Technical Interview</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Segoe UI;
        }

        body{
            background:#f4f7fc;
        }

        .header{
            background:#2563eb;
            color:white;
            padding:20px;
            text-align:center;
            font-size:30px;
            font-weight:bold;
        }

        .container{
            width:90%;
            max-width:1000px;
            margin:40px auto;
        }

        .card{
            background:white;
            padding:30px;
            border-radius:15px;
            box-shadow:0 5px 20px rgba(0,0,0,.1);
        }

        .role{
            color:#2563eb;
            margin-bottom:25px;
        }

        .question{
            background:#f8fafc;
            padding:20px;
            border-radius:10px;
            margin-bottom:25px;
            border-left:5px solid #2563eb;
        }

        .question h3{
            margin-bottom:15px;
        }

        .option{
            padding:8px;
        }

        .option input{
            margin-right:10px;
        }

        .submit-btn{
            background:#2563eb;
            color:white;
            border:none;
            padding:15px 30px;
            border-radius:10px;
            font-size:16px;
            cursor:pointer;
        }

        .submit-btn:hover{
            background:#1d4ed8;
        }

    </style>

</head>

<body>

<div class="header">
    Technical Interview
</div>

<div class="container">

    <div class="card">

        <h2 class="role">
            Selected Role:
            {{role}}
        </h2>

        <form method="POST">

            {% for q in questions %}

                {% set q_index = loop.index %}

                <div class="question">

                    <h3>
                        Q{{q_index}}.
                        {{q.question}}
                    </h3>

                    {% for option in q.options %}

                        <div class="option">

                            <label>

                                <input
                                    type="radio"
                                    name="q{{q_index}}"
                                    value="{{option}}"
                                    required>

                                {{option}}

                            </label>

                        </div>

                    {% endfor %}

                </div>

            {% endfor %}

            <button
                type="submit"
                class="submit-btn">

                Submit Test

            </button>

        </form>

    </div>

</div>

</body>
</html>
