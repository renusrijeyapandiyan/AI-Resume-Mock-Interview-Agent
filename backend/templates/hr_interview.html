<!DOCTYPE html>
<html>
<head>
    <title>AI Mock Interview</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Segoe UI;
        }

        body{
            background:#f4f7fc;
            height:100vh;
            display:flex;
            flex-direction:column;
        }

        .header{
            background:#2563eb;
            color:white;
            padding:20px;
            text-align:center;
            font-size:28px;
            font-weight:bold;
        }

        .chat-box{
            flex:1;
            overflow-y:auto;
            padding:30px;
        }

        .message{
            margin-bottom:20px;
            display:flex;
        }

        .ai{
            justify-content:flex-start;
        }

        .user{
            justify-content:flex-end;
        }

        .bubble{
            max-width:70%;
            padding:15px;
            border-radius:15px;
            font-size:16px;
        }

        .ai .bubble{
            background:white;
            box-shadow:0 2px 10px rgba(0,0,0,.1);
        }

        .user .bubble{
            background:#2563eb;
            color:white;
        }

        .input-area{
            background:white;
            padding:20px;
            border-top:1px solid #ddd;
        }

        textarea{
            width:100%;
            height:100px;
            padding:15px;
            border:1px solid #ccc;
            border-radius:10px;
            resize:none;
            margin-bottom:15px;
        }

        button{
            background:#2563eb;
            color:white;
            border:none;
            padding:15px 30px;
            border-radius:10px;
            cursor:pointer;
            font-size:16px;
        }

    </style>
</head>

<body>

<div class="header">
    AI Mock Interview - {{ role }}
</div>

<div class="chat-box">

    <div class="message ai">

        <div class="bubble">
            <b>Question {{current}}</b><br><br>

              {% if question.question %}
              {{ question.question }}
              {% else %}
              {{ question }}
              {% endif %}
        </div>

    </div>

</div>


<div class="input-area">

    <form method="POST">

        <textarea
            name="answer"
            placeholder="Type your answer..."
            required>
        </textarea>

        <button type="submit">
            Submit Answer
        </button>

    </form>

</div>

</body>
</html>
