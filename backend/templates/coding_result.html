<!DOCTYPE html>
<html>
<head>

    <title>Coding Assessment Report</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Segoe UI',sans-serif;
        }

        body{
            background:#f4f7fc;
        }

        .header{
            background:#2563eb;
            color:white;
            padding:20px;
            text-align:center;
            font-size:32px;
            font-weight:bold;
        }

        .container{
            width:90%;
            max-width:1100px;
            margin:40px auto;
        }

        .card{
            background:white;
            padding:35px;
            border-radius:20px;
            box-shadow:0 5px 25px rgba(0,0,0,.1);
            margin-bottom:30px;
        }

        .score-section{
            display:flex;
            justify-content:center;
            align-items:center;
            flex-direction:column;
        }

        .circle{
            width:180px;
            height:180px;
            border-radius:50%;
            background:
            conic-gradient(
                #2563eb {{score}}%,
                #e5e7eb {{score}}%
            );
            display:flex;
            justify-content:center;
            align-items:center;
            margin-bottom:20px;
        }

        .inner{
            width:140px;
            height:140px;
            background:white;
            border-radius:50%;
            display:flex;
            justify-content:center;
            align-items:center;
            flex-direction:column;
        }

        .percent{
            font-size:38px;
            font-weight:bold;
            color:#2563eb;
        }

        .grade{
            font-size:20px;
            color:#555;
        }

        .details{
            display:grid;
            grid-template-columns:repeat(3,1fr);
            gap:20px;
            margin-top:30px;
        }

        .box{
            background:#f8fafc;
            padding:20px;
            border-radius:15px;
            text-align:center;
        }

        .box h2{
            color:#2563eb;
            margin-bottom:10px;
        }

        h3{
            color:#2563eb;
            margin-bottom:15px;
        }

        pre{
            background:#1e293b;
            color:#f8fafc;
            padding:20px;
            border-radius:15px;
            overflow:auto;
            font-size:15px;
        }

        ul{
            margin-left:20px;
        }

        li{
            margin-bottom:10px;
            font-size:16px;
        }

        .buttons{
            text-align:center;
            margin-top:30px;
        }

        a{
            text-decoration:none;
            color:white;
            padding:15px 30px;
            border-radius:10px;
            margin:10px;
            display:inline-block;
        }

        .retry{
            background:#2563eb;
        }

        .dashboard{
            background:#16a34a;
        }

    </style>

</head>

<body>

<div class="header">
    Coding Assessment Report
</div>

<div class="container">

    <!-- SCORE -->
    <div class="card">

        <div class="score-section">

            <div class="circle">

                <div class="inner">

                    <div class="percent">
                        {{score}}%
                    </div>

                    <div class="grade">
                        {{grade}}
                    </div>

                </div>

            </div>

        </div>

        <div class="details">

            <div class="box">
                <h2>{{language}}</h2>
                <p>Language</p>
            </div>

            <div class="box">
                <h2>{{score}}</h2>
                <p>Score</p>
            </div>

            <div class="box">
                <h2>{{grade}}</h2>
                <p>Performance</p>
            </div>

        </div>

    </div>

    <!-- CODE -->
    <div class="card">

        <h3>
            Submitted Code
        </h3>

        <pre>{{code}}</pre>

    </div>

    <!-- AI FEEDBACK -->
    <div class="card">

        <h3>
            AI Suggestions
        </h3>

        <ul>

            {% for s in suggestions %}

                <li>
                    {{s}}
                </li>

            {% endfor %}

        </ul>

    </div>

    <!-- BUTTONS -->
    <div class="buttons">

        <a
            class="retry"
            href="{{url_for('interview.coding',role=role)}}">

            Try Again

        </a>

        <a
            class="dashboard"
            href="{{url_for('dashboard.dashboard_home')}}">

            Dashboard

        </a>

    </div>

</div>

</body>
</html>
