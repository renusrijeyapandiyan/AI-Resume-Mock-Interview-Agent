<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport"
      content="width=device-width, initial-scale=1.0">

<title>My Profile</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    background:#f4f7fb;
}

/* HEADER */

.header{
    height:220px;
    background:linear-gradient(
        135deg,
        #2563eb,
        #7c3aed
    );
}

/* CARD */

.container{
    width:90%;
    max-width:1100px;
    margin:-80px auto 40px;
}

.card{
    background:white;
    border-radius:20px;
    padding:40px;
    box-shadow:
        0 10px 30px
        rgba(0,0,0,.1);
}

/* TOP */

.top{
    display:flex;
    justify-content:space-between;
    align-items:center;
    flex-wrap:wrap;
}

.profile-info{
    display:flex;
    align-items:center;
    gap:25px;
}

.avatar{
    width:120px;
    height:120px;
    background:#2563eb;
    color:white;
    border-radius:50%;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:50px;
    font-weight:bold;
}

.name{
    font-size:32px;
    font-weight:700;
    color:#111827;
}

.email{
    color:#64748b;
    margin-top:5px;
}

.edit-btn{
    background:#2563eb;
    color:white;
    border:none;
    padding:14px 28px;
    border-radius:10px;
    cursor:pointer;
    font-size:16px;
}

/* STATS */

.stats{
    display:grid;
    grid-template-columns:
        repeat(auto-fit,
        minmax(200px,1fr));
    gap:20px;
    margin:40px 0;
}

.stat{
    background:#f8fafc;
    padding:25px;
    border-radius:15px;
    text-align:center;
}

.stat h2{
    color:#2563eb;
    font-size:30px;
}

.stat p{
    color:#64748b;
}

/* FORM */

.grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:25px;
}

.section{
    background:#f8fafc;
    padding:25px;
    border-radius:15px;
}

.section h3{
    margin-bottom:20px;
    color:#111827;
}

label{
    display:block;
    margin-top:15px;
    margin-bottom:8px;
    font-weight:600;
}

input,
textarea{
    width:100%;
    padding:12px;
    border:1px solid #ddd;
    border-radius:10px;
    font-size:15px;
}

textarea{
    height:120px;
    resize:none;
}

.save{
    background:#2563eb;
    color:white;
    border:none;
    padding:16px 30px;
    border-radius:10px;
    margin-top:30px;
    cursor:pointer;
    font-size:16px;
}

.back{
    display:inline-block;
    margin-top:20px;
    text-decoration:none;
    color:#2563eb;
    font-weight:600;
}

@media(max-width:900px){

    .grid{
        grid-template-columns:1fr;
    }

    .top{
        flex-direction:column;
        gap:20px;
        align-items:flex-start;
    }
}

</style>

</head>

<body>

<div class="header"></div>

<div class="container">

<div class="card">

    <!-- TOP -->

    <div class="top">

        <div class="profile-info">

            <div class="avatar">
                {{user.name[0]|upper}}
            </div>

            <div>
                <div class="name">
                    {{user.name}}
                </div>

                <div class="email">
                    {{user.email}}
                </div>
            </div>

        </div>

        <button
            class="edit-btn"
            onclick="enableEdit()">

            <i class="fa fa-edit"></i>
            Edit Profile

        </button>

    </div>


    <!-- STATS -->

    <div class="stats">

        <div class="stat">
            <h2>{{user.total_resumes}}</h2>
            <p>Resumes</p>
        </div>

        <div class="stat">
            <h2>{{user.level or 1}}</h2>
            <p>Level</p>
        </div>

        <div class="stat">
            <h2>{{user.xp or 0}}</h2>
            <p>XP</p>
        </div>

    </div>


    <!-- FORM -->

    <form method="POST">

        <div class="grid">

            <div class="section">

                <h3>
                    Personal Information
                </h3>

                <label>Phone</label>
                <input
                    disabled
                    name="phone"
                    value="{{user.phone or ''}}">

                <label>Location</label>
                <input
                    disabled
                    name="location"
                    value="{{user.location or ''}}">

                <label>Bio</label>
                <textarea
                    disabled
                    name="bio">{{user.bio or ''}}</textarea>

            </div>


            <div class="section">

                <h3>
                    Education
                </h3>

                <label>College</label>
                <input
                    disabled
                    name="college"
                    value="{{user.college or ''}}">

                <label>Degree</label>
                <input
                    disabled
                    name="degree"
                    value="{{user.degree or ''}}">

                <label>Specialization</label>
                <input
                    disabled
                    name="specialization"
                    value="{{user.specialization or ''}}">

                <label>Graduation Year</label>
                <input
                    disabled
                    name="graduation_year"
                    value="{{user.graduation_year or ''}}">

            </div>


            <div class="section">

                <h3>
                    Career
                </h3>

                <label>Current Role</label>
                <input
                    disabled
                    name="current_role"
                    value="{{user.current_role or ''}}">

                <label>Preferred Role</label>
                <input
                    disabled
                    name="preferred_role"
                    value="{{user.preferred_role or ''}}">

                <label>Skills</label>
                <textarea
                    disabled
                    name="skills_summary">{{user.skills_summary or ''}}</textarea>

            </div>


            <div class="section">

                <h3>
                    Professional Links
                </h3>

                <label>LinkedIn</label>
                <input
                    disabled
                    name="linkedin"
                    value="{{user.linkedin or ''}}">

                <label>GitHub</label>
                <input
                    disabled
                    name="github"
                    value="{{user.github or ''}}">

                <label>Portfolio</label>
                <input
                    disabled
                    name="portfolio"
                    value="{{user.portfolio or ''}}">

            </div>

        </div>

        <button
            id="saveBtn"
            class="save"
            style="display:none;">

            Save Changes

        </button>

    </form>

    <a
        href="{{url_for('dashboard.dashboard_home')}}"
        class="back">

        ← Back to Dashboard

    </a>

</div>

</div>

<script>

function enableEdit(){

    const fields =
        document.querySelectorAll(
            "input,textarea"
        );

    fields.forEach(field=>{
        field.disabled=false;
    });

    document.getElementById(
        "saveBtn"
    ).style.display="block";
}

</script>

</body>
</html>
